<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>3ᵉ loi de Newton - Dynamomètres</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f5f5f5;
      user-select: none;
    }

    #scene {
      position: relative;
      width: 900px;
      height: 350px;
      background: white;
      border: 1px solid #ccc;
      overflow: hidden;
    }

    /* Mains réalistes */
    .hand {
      position: absolute;
      top: 95px;
      height: 160px;
      pointer-events: none;
    }
    #handLeft {
      left: 20px;     /* main gauche bien visible à gauche */
    }
    #handRight {
      right: 20px;    /* main droite bien visible à droite */
    }

    /* Barre commune */
    .bar {
      position: absolute;
      top: 165px;
      left: 130px;
      width: 640px;
      height: 16px;
      background: #444;
      border-radius: 8px;
    }

    /* Crochets */
    .hook {
      position: absolute;
      top: 157px;
      width: 24px;
      height: 24px;
      border: 3px solid #555;
      border-radius: 50%;
      background: white;
      box-sizing: border-box;
    }
    #hookLeft  { left: 260px; }
    #hookRight { right: 260px; }

    /* Points rouge / bleu */
    .dragPoint {
      position: absolute;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #333;
      box-sizing: border-box;
    }
    #pointLeft {
      background: red;
      top: 165px;
      left: 260px;
      transform: translate(-50%, -50%);
    }
    #pointRight {
      background: blue;
      top: 165px;
      right: 260px;
      transform: translate(50%, -50%);
    }

    /* Fenêtres des dynamomètres */
    .window {
      position: absolute;
      top: 190px;
      width: 80px;
      height: 40px;
      overflow: hidden;
      border-radius: 4px;
      border: 1px solid #333;
      background: transparent;
    }
    #windowLeft  { left: 220px; }
    #windowRight { right: 220px; }

    /* Bande horizontale 0–40 N qui coulisse */
    .tape {
      position: absolute;
      top: 0;
      left: 0;
      width: 1000px;  /* largeur supposée de bande_dynamometre_0_40_h.jpg */
      height: 40px;
      background: url("bande_dynamometre_0_40_h.jpg") no-repeat left center;
      background-size: 1000px 40px;
      transition: left 0.08s linear;
    }

    #controls {
      margin-top: 8px;
    }

    #resetBtn {
      padding: 4px 10px;
      font-size: 14px;
      cursor: pointer;
    }

    #signature {
      margin-top: 4px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>
  <div id="scene">
    <!-- Mains -->
    <img id="handLeft"  class="hand" src="maingauche.png"  alt="">
    <img id="handRight" class="hand" src="maindroite.jpg" alt="">

    <!-- Barre centrale -->
    <div class="bar"></div>

    <!-- Crochets + points -->
    <div id="hookLeft"  class="hook"></div>
    <div id="hookRight" class="hook"></div>

    <div id="pointLeft"  class="dragPoint"></div>
    <div id="pointRight" class="dragPoint"></div>

    <!-- Fenêtres & bandes -->
    <div id="windowLeft" class="window">
      <div id="tapeLeft" class="tape"></div>
    </div>
    <div id="windowRight" class="window">
      <div id="tapeRight" class="tape"></div>
    </div>
  </div>

  <div id="controls">
    <button id="resetBtn">Réinitialiser</button>
  </div>

  <div id="signature">
    Animation adaptée et codée par Virginie Fourcassier – Lycée Pierre de Fermat – Toulouse.
  </div>

  <script>
    const F0 = 10;
    const k  = 0.05;
    const L0 = 260;

    const scene      = document.getElementById("scene");
    const pointLeft  = document.getElementById("pointLeft");
    const pointRight = document.getElementById("pointRight");
    const tapeLeft   = document.getElementById("tapeLeft");
    const tapeRight  = document.getElementById("tapeRight");
    const resetBtn   = document.getElementById("resetBtn");

    let dragging = null;

    function getX(elem) {
      const rectScene = scene.getBoundingClientRect();
      const rect      = elem.getBoundingClientRect();
      return rect.left + rect.width / 2 - rectScene.left;
    }

    function setX(elem, x) {
      const min = 180;
      const max = scene.clientWidth - 180;
      const clamped = Math.max(min, Math.min(max, x));
      elem.style.left = clamped + "px";
    }

    function quantizeForce(F) {
      const values = [0, 10, 20, 30, 40];
      let best = values[0];
      let bestDiff = Math.abs(F - best);
      for (let i = 1; i < values.length; i++) {
        const diff = Math.abs(F - values[i]);
        if (diff < bestDiff) {
          bestDiff = diff;
          best = values[i];
        }
      }
      return best;
    }

    function updateGeometry() {
      const xL = getX(pointLeft);
      const xR = getX(pointRight);

      const distance  = Math.abs(xR - xL);
      const extension = Math.max(0, distance - L0);
      const F         = F0 + k * extension;

      const Fclamped  = Math.max(0, Math.min(40, F));
      const Fdiscrete = quantizeForce(Fclamped);

      const segmentWidth = 200;
      const windowWidth  = 80;
      const baseOffset   = (segmentWidth - windowWidth) / 2;

      const index = Fdiscrete / 10;
      const shift = index * segmentWidth + baseOffset;

      tapeLeft.style.left  = -shift + "px";
      tapeRight.style.left = -shift + "px";
    }

    function onMouseDown(e, which) {
      dragging = which;
      window.addEventListener("mousemove", onMouseMove);
      window.addEventListener("mouseup", onMouseUp);
      e.preventDefault();
    }

    function onMouseMove(e) {
      if (!dragging) return;
      const rectScene = scene.getBoundingClientRect();
      const target = dragging === "left" ? pointLeft : pointRight;
      const newX = e.clientX - rectScene.left;
      setX(target, newX);
      updateGeometry();
    }

    function onMouseUp() {
      dragging = null;
      window.removeEventListener("mousemove", onMouseMove);
      window.removeEventListener("mouseup", onMouseUp);
    }

    pointLeft.addEventListener("mousedown", e => onMouseDown(e, "left"));
    pointRight.addEventListener("mousedown", e => onMouseDown(e, "right"));

    function initPositions() {
      const mid = scene.clientWidth / 2;
      setX(pointLeft,  mid - L0 / 2);
      setX(pointRight, mid + L0 / 2);
      updateGeometry();
    }

    resetBtn.addEventListener("click", initPositions);
    window.addEventListener("load", initPositions);
    window.addEventListener("resize", initPositions);
  </script>
</body>
</html>
