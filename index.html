<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>3e loi de Newton</title>
  <style>
    body{
      margin:0;
      background:#dcdcdc;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
    }

    #container{
      position:relative;
      width:640px;
      height:400px;
      background:#efefef;
      overflow:hidden;
    }

    canvas{
      position:absolute;
      inset:0;
      display:block;
      z-index:2;
    }

    .hand{
      position:absolute;
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
      z-index:3;
      display:block;
    }

    #handL{
      width:230px;
      height:auto;
      left:0;
      top:0;
    }

    #handR{
      width:230px;
      height:auto;
      left:0;
      top:0;
    }

    .credit{
      position:absolute;
      left:0;
      right:0;
      bottom:6px;
      text-align:center;
      font-size:11px;
      color:#b5b5b5;
      line-height:1.2;
      pointer-events:none;
      z-index:4;
      padding:0 8px;
    }
  </style>
</head>
<body>

  <div id="container">
    <canvas id="c" width="640" height="400"></canvas>

    <img id="handL" class="hand" src="hand_left.PNG" alt="">
    <img id="handR" class="hand" src="hand_right.PNG" alt="">

    <div class="credit">
      Animation adaptée et codée à partir de www.vascak.cz par : Virginie Fourcassier - Lycée Pierre de Fermat - Toulouse
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
