<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>3ᵉ loi de Newton - Dynamomètres</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f5f5f5;
      user-select: none;
    }

    #scene {
      position: relative;
      width: 900px;
      height: 350px;
      background: white;
      border: 1px solid #ccc;
      overflow: hidden;
    }

    /* Mains réalistes */
    .hand {
      position: absolute;
      top: 95px;
      height: 160px;
      pointer-events: none;
    }
    #handLeft {
      left: -10px;       /* bien collée au bord gauche */
      transform: scaleX(-1);
    }
    #handRight {
      right: -10px;      /* bien collée au bord droit */
    }

    /* Tige commune (barre grise centrale) */
    .bar {
      position: absolute;
      top: 165px;
      left: 130px;
      width: 640px;
      height: 16px;
      background: #444;
      border-radius: 8px;
    }

    /* Crochets centraux */
    .hook {
      position: absolute;
      top: 157px;
      width: 24px;
      height: 24px;
      border: 3px solid #555;
      border-radius: 50%;
      background: white;
      box-sizing: border-box;
    }
    #hookLeft  { left: 260px; }
    #hookRight { right: 260px; }

    /* Points de préhension (rouge / bleu) */
    .dragPoint {
      position: absolute;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #333;
      box-sizing: border-box;
    }
    #pointLeft {
      background: red;
      top: 165px;
      left: 260px;
      transform: translate(-50%, -50%);
    }
    #pointRight {
      background: blue;
      top: 165px;
      right: 260px;
      transform: translate(50%, -50%);
    }

    /* Fenêtres des dynamomètres */
    .window {
      position: absolute;
      top: 190px;
      width: 80px;
      height: 40px;
      overflow: hidden;
      border-radius: 4px;
      border: 1px solid #333;
      background: transparent;
    }
    #windowLeft  { left: 220px; }
    #windowRight { right: 220px; }

    /* Bande graduée PNG 0–40 N verticale qui coulisse */
    .tape {
      position: absolute;
      left: 0;
      top: 0;
      width: 80px;   /* largeur de bande_dynamometre_0_40.png */
      height: 480px; /* hauteur de l'image */
      background: url("bande_dynamometre_0_40.png") no-repeat top left;
      background-size: 80px 480px;
      transition: top 0.08s linear;
    }

    #info {
      margin-top: 6px;
      font-size: 14px;
      min-height: 1.2em;
    }

    #signature {
      margin-top: 2px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>
  <div id="scene">
    <!-- Mains -->
    <img id="handLeft"  class="hand" src="maingauche.png"  alt="">
    <img id="handRight" class="hand" src="maindroite.jpg" alt="">

    <!-- Barre centrale (tige commune) -->
    <div class="bar"></div>

    <!-- Crochets + points de préhension -->
    <div id="hookLeft"  class="hook"></div>
    <div id="hookRight" class="hook"></div>

    <div id="pointLeft"  class="dragPoint"></div>
    <div id="pointRight" class="dragPoint"></div>

    <!-- Fenêtres & bandes graduées -->
    <div id="windowLeft" class="window">
      <div id="tapeLeft" class="tape"></div>
    </div>
    <div id="windowRight" class="window">
      <div id="tapeRight" class="tape"></div>
    </div>
  </div>

  <div id="info"></div>
  <div id="signature">
    Animation adaptée et codée par Virginie Fourcassier – Lycée Pierre de Fermat – Toulouse.
  </div>

  <script>
    // Paramètres "physiques" simplifiés
    const F0 = 10;     // force de base (N)
    const k  = 0.05;   // raideur fictive (N / pixel)
    const L0 = 260;    // longueur au repos entre les points rouge/bleu (px)

    const scene      = document.getElementById("scene");
    const pointLeft  = document.getElementById("pointLeft");
    const pointRight = document.getElementById("pointRight");
    const tapeLeft   = document.getElementById("tapeLeft");
    const tapeRight  = document.getElementById("tapeRight");

    let dragging = null;
    let offsetX  = 0;

    function getX(elem) {
      const rectScene = scene.getBoundingClientRect();
      const rect      = elem.getBoundingClientRect();
      return rect.left + rect.width / 2 - rectScene.left;
    }

    // Zone de déplacement élargie pour permettre plusieurs positions
    function setX(elem, x) {
      const min = 180;                       // plus près de la main gauche
      const max = scene.clientWidth - 180;   // plus près de la main droite
      const clamped = Math.max(min, Math.min(max, x));
      elem.style.left = clamped + "px";
    }

    // Quantification sur {0,10,20,30,40}
    function quantizeForce(F) {
      const values = [0, 10, 20, 30, 40];
      let best = values[0];
      let bestDiff = Math.abs(F - best);
      for (let i = 1; i < values.length; i++) {
        const diff = Math.abs(F - values[i]);
        if (diff < bestDiff) {
          bestDiff = diff;
          best = values[i];
        }
      }
      return best;
    }

    function updateGeometry() {
      const xL = getX(pointLeft);
      const xR = getX(pointRight);

      // Force "continue" à partir de la distance
      const distance  = Math.abs(xR - xL);
      const extension = Math.max(0, distance - L0);
      const F         = F0 + k * extension;

      // Limitation et quantification
      const Fclamped  = Math.max(0, Math.min(40, F));
      const Fdiscrete = quantizeForce(Fclamped); // 0,10,20,30,40

      // Défilement de la bande : 5 segments égaux (0,10,20,30,40) sur 480 px
      const segmentHeight = 96;      // 480 / 5
      const visibleHeight = 40;      // hauteur de la fenêtre
      const baseOffset    = (segmentHeight - visibleHeight) / 2;

      const index = Fdiscrete / 10;  // 0,1,2,3,4
      const shift = index * segmentHeight + baseOffset;

      tapeLeft.style.top  = -shift + "px";
      tapeRight.style.top = -shift + "px";
    }

    function onMouseDown(e, which) {
      dragging = which;
      const target    = which === "left" ? pointLeft : pointRight;
      const rectScene = scene.getBoundingClientRect();
      const rect      = target.getBoundingClientRect();
      offsetX = e.clientX - (rect.left + rect.width / 2 - rectScene.left);
      window.addEventListener("mousemove", onMouseMove);
      window.addEventListener("mouseup", onMouseUp);
    }

    function onMouseMove(e) {
      if (!dragging) return;
      const rectScene = scene.getBoundingClientRect();
      const x = e.clientX - rectScene.left - offsetX;
      const target = dragging === "left" ? pointLeft : pointRight;
      setX(target, x);
      updateGeometry();
    }

    function onMouseUp() {
      dragging = null;
      window.removeEventListener("mousemove", onMouseMove);
      window.removeEventListener("mouseup", onMouseUp);
    }

    pointLeft.addEventListener("mousedown", e => onMouseDown(e, "left"));
    pointRight.addEventListener("mousedown", e => onMouseDown(e, "right"));

    function initPositions() {
      const mid = scene.clientWidth / 2;
      setX(pointLeft,  mid - L0 / 2);
      setX(pointRight, mid + L0 / 2);
      updateGeometry();
    }

    window.addEventListener("load", initPositions);
    window.addEventListener("resize", initPositions);
  </script>
</body>
</html>
