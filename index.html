<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>3ᵉ loi de Newton - Dynamomètres</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f5f5f5;
      user-select: none;
    }

    #scene {
      position: relative;
      width: 900px;
      height: 350px;
      background: white;
      border: 1px solid #ccc;
      overflow: hidden;
    }

    /* Mains réalistes */
    .hand {
      position: absolute;
      top: 90px;
      height: 180px;
      pointer-events: none;
    }
    #handLeft {
      left: -40px;
      transform: scaleX(-1);
    }
    #handRight {
      right: -40px;
    }

    /* Tiges des dynamomètres */
    .rod {
      position: absolute;
      top: 165px;
      height: 16px;
      background: #444;
      border-radius: 8px;
    }
    #rodLeft  { left: 190px; }
    #rodRight { right: 190px; }

    /* Crochets centraux */
    .hook {
      position: absolute;
      top: 157px;
      width: 24px;
      height: 24px;
      border: 3px solid #555;
      border-radius: 50%;
      background: white;
      box-sizing: border-box;
    }
    #hookLeft  { left: 280px; }
    #hookRight { right: 280px; }

    /* Points de préhension (rouge / bleu) */
    .dragPoint {
      position: absolute;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #333;
      box-sizing: border-box;
    }
    #pointLeft {
      background: red;
      top: 169px;
      left: 280px;
      transform: translate(-50%, -50%);
    }
    #pointRight {
      background: blue;
      top: 169px;
      right: 280px;
      transform: translate(50%, -50%);
    }

    /* Fenêtres des dynamomètres (vision d'une valeur) */
    .window {
      position: absolute;
      top: 185px;
      width: 80px;   /* comme la bande */
      height: 40px;  /* environ un segment visible */
      overflow: hidden;
      border-radius: 4px;
      border: 1px solid #333;
      background: transparent;
    }
    #windowLeft  { left: 215px; }
    #windowRight { right: 215px; }

    /* Bande graduée PNG qui coulisse */
    .tape {
      position: absolute;
      left: 0;
      top: 0;
      width: 80px;   /* largeur exacte de l'image */
      height: 480px; /* hauteur exacte de l'image */
      background: url("bande_dynamometre_0_40.png") no-repeat top left;
      background-size: 80px 480px;
      transition: top 0.08s linear;
    }

    #info {
      margin-top: 6px;
      font-size: 14px;
      min-height: 1.2em;
    }

    #signature {
      margin-top: 2px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>
  <div id="scene">
    <!-- Mains réalistes -->
    <img id="handLeft"  class="hand" src="maingauche.png"  alt="">
    <img id="handRight" class="hand" src="maindroite.jpg" alt="">

    <!-- Tiges des dynamomètres -->
    <div id="rodLeft"  class="rod"></div>
    <div id="rodRight" class="rod"></div>

    <!-- Crochets + points de préhension -->
    <div id="hookLeft"  class="hook"></div>
    <div id="hookRight" class="hook"></div>

    <div id="pointLeft"  class="dragPoint"></div>
    <div id="pointRight" class="dragPoint"></div>

    <!-- Fenêtres & bandes graduées -->
    <div id="windowLeft" class="window">
      <div id="tapeLeft" class="tape"></div>
    </div>
    <div id="windowRight" class="window">
      <div id="tapeRight" class="tape"></div>
    </div>
  </div>

  <div id="info"></div>
  <div id="signature">
    Animation adaptée et codée par Virginie Fourcassier – Lycée Pierre de Fermat – Toulouse.
  </div>

  <script>
    // Paramètres "physiques" simplifiés
    const F0 = 10;     // force de base (N)
    const k  = 0.05;   // raideur fictive (N / pixel)
    const L0 = 260;    // longueur au repos entre les points rouge/bleu (px)

    const scene      = document.getElementById("scene");
    const pointLeft  = document.getElementById("pointLeft");
    const pointRight = document.getElementById("pointRight");
    const rodLeft    = document.getElementById("rodLeft");
    const rodRight   = document.getElementById("rodRight");
    const tapeLeft   = document.getElementById("tapeLeft");
    const tapeRight  = document.getElementById("tapeRight");

    let dragging = null;
    let offsetX  = 0;

    function getX(elem) {
      const rectScene = scene.getBoundingClientRect();
      const rect      = elem.getBoundingClientRect();
      return rect.left + rect.width / 2 - rectScene.left;
    }

    function setX(elem, x) {
      const min = 190;
      const max = scene.clientWidth - 190;
      const clamped = Math.max(min, Math.min(max, x));
      elem.style.left = clamped + "px";
    }

    function updateGeometry() {
      const xL = getX(pointLeft);
      const xR = getX(pointRight);

      // Mise à jour des tiges
      rodLeft.style.left  = "190px";
      rodLeft.style.width = (xL - 190) + "px";

      rodRight.style.left  = xR + "px";
      rodRight.style.width = (scene.clientWidth - 190 - xR) + "px";

      // Force commune (modèle ressort)
      const distance  = Math.abs(xR - xL);
      const extension = Math.max(0, distance - L0);
      const F         = F0 + k * extension;

      // limitation 0–40 N pour coller à l'image
      const Fclamped  = Math.max(0, Math.min(40, F));

      // Projection de la force sur le défilement de la bande :
      // image 480 px de haut, fenêtre 40 px de haut -> environ 440 px de course utile
      const visibleHeight = 40;
      const totalHeight   = 480;
      const maxShift      = totalHeight - visibleHeight;  // ≈ 440 px
      const shift         = (Fclamped / 40) * maxShift;

      tapeLeft.style.top  = -shift + "px";
      tapeRight.style.top = -shift + "px";
    }

    function onMouseDown(e, which) {
      dragging = which;
      const target    = which === "left" ? pointLeft : pointRight;
      const rectScene = scene.getBoundingClientRect();
      const rect      = target.getBoundingClientRect();
      offsetX = e.clientX - (rect.left + rect.width / 2 - rectScene.left);
      window.addEventListener("mousemove", onMouseMove);
      window.addEventListener("mouseup", onMouseUp);
    }

    function onMouseMove(e) {
      if (!dragging) return;
      const rectScene = scene.getBoundingClientRect();
      const x = e.clientX - rectScene.left - offsetX;
      const target = dragging === "left" ? pointLeft : pointRight;
      setX(target, x);
      updateGeometry();
    }

    function onMouseUp() {
      dragging = null;
      window.removeEventListener("mousemove", onMouseMove);
      window.removeEventListener("mouseup", onMouseUp);
    }

    pointLeft.addEventListener("mousedown", e => onMouseDown(e, "left"));
    pointRight.addEventListener("mousedown", e => onMouseDown(e, "right"));

    function initPositions() {
      const mid = scene.clientWidth / 2;
      setX(pointLeft,  mid - L0 / 2);
      setX(pointRight, mid + L0 / 2);
      updateGeometry();
    }

    window.addEventListener("load", initPositions);
    window.addEventListener("resize", initPositions);
  </script>
</body>
</html>
