<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>3ᵉ loi de Newton - Dynamomètres</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f5f5f5;
      user-select: none;
    }
    #scene {
      position: relative;
      width: 900px;
      height: 350px;
      background: white;
      border: 1px solid #ccc;
      overflow: hidden;
    }

    /* Mains (remplacent les rectangles approximatifs) */
    .hand {
      position: absolute;
      top: 80px;
      height: 180px;
      pointer-events: none; /* on ne les attrape pas à la souris */
    }
    #handLeft {
      left: 0;
      transform: scaleX(-1); /* on retourne l'image de gauche si besoin */
    }
    #handRight {
      right: 0;
    }

    /* Tiges des dynamomètres */
    .rod {
      position: absolute;
      top: 165px;
      height: 16px;
      background: #444;
      border-radius: 8px;
    }
    #rodLeft { left: 190px; }
    #rodRight { right: 190px; }

    /* Crochets centraux (pour accrocher la "corde") */
    .hook {
      position: absolute;
      top: 157px;
      width: 24px;
      height: 24px;
      border: 3px solid #555;
      border-radius: 50%;
      background: white;
      box-sizing: border-box;
    }
    #hookLeft { left: 280px; }
    #hookRight { right: 280px; }

    /* Points de préhension (rouge / bleu) */
    .dragPoint {
      position: absolute;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #333;
      box-sizing: border-box;
    }
    #pointLeft {
      background: red;
      top: 169px;
      left: 280px;
      transform: translate(-50%, -50%);
    }
    #pointRight {
      background: blue;
      top: 169px;
      right: 280px;
      transform: translate(50%, -50%);
    }

    /* Fenêtres des dynamomètres (où défileront les graduations) */
    .window {
      position: absolute;
      top: 185px;
      width: 70px;
      height: 28px;
      overflow: hidden;
      border-radius: 4px;
      border: 1px solid #333;
      background: #ddd;
    }
    #windowLeft { left: 215px; }
    #windowRight { right: 215px; }

    /* Bande graduée qui coulisse à l'intérieur de la fenêtre */
    .tape {
      position: absolute;
      left: 0;
      top: 0;
      width: 70px;
      height: 280px; /* assez long pour plusieurs graduations */
      background: linear-gradient(
        to bottom,
        #b00 0 40px,
        #d33 40px 80px,
        #f55 80px 120px,
        #fff 120px 160px,
        #ddd 160px 200px,
        #bbb 200px 240px,
        #999 240px 280px
      );
      transition: top 0.08s linear;
    }

    #info {
      margin-top: 6px;
      font-size: 14px;
      min-height: 1.2em;
    }

    /* Signature */
    #signature {
      margin-top: 2px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>
  <div id="scene">
    <!-- Mains réalistes -->
    <img id="handLeft"  class="hand" src="maingauche.jpg" alt="">
    <img id="handRight" class="hand" src="maindroite.jpg"  alt="">

    <!-- Tiges des dynamomètres -->
    <div id="rodLeft"  class="rod"></div>
    <div id="rodRight" class="rod"></div>

    <!-- Crochets + points de préhension -->
    <div id="hookLeft"  class="hook"></div>
    <div id="hookRight" class="hook"></div>

    <div id="pointLeft"  class="dragPoint"></div>
    <div id="pointRight" class="dragPoint"></div>

    <!-- Fenêtres & bandes graduées -->
    <div id="windowLeft" class="window">
      <div id="tapeLeft" class="tape"></div>
    </div>
    <div id="windowRight" class="window">
      <div id="tapeRight" class="tape"></div>
    </div>
  </div>

  <div id="info"></div>
  <div id="signature">Animation adaptée et codée par Virginie Fourcassier – Lycée Pierre de Fermat – Toulouse.</div>

  <script>
    // Paramètres "physiques" simplifiés
    const F0 = 10;     // force de base (N)
    const k  = 0.05;   // raideur fictive (N / pixel)
    const L0 = 260;    // longueur au repos entre les points rouge/bleu (px)

    const scene      = document.getElementById("scene");
    const pointLeft  = document.getElementById("pointLeft");
    const pointRight = document.getElementById("pointRight");
    const rodLeft    = document.getElementById("rodLeft");
    const rodRight   = document.getElementById("rodRight");
    const tapeLeft   = document.getElementById("tapeLeft");
    const tapeRight  = document.getElementById("tapeRight");

    let dragging = null; // "left" ou "right"
    let offsetX  = 0;

    function getX(elem) {
      const rectScene = scene.getBoundingClientRect();
      const rect      = elem.getBoundingClientRect();
      return rect.left + rect.width / 2 - rectScene.left;
    }

    function setX(elem, x) {
      const min = 190;                          // proche de la main gauche
      const max = scene.clientWidth - 190;      // proche de la main droite
      const clamped = Math.max(min, Math.min(max, x));
      elem.style.left = clamped + "px";
    }

    function updateGeometry() {
      const xL = getX(pointLeft);
      const xR = getX(pointRight);

      // Mise à jour des tiges
      rodLeft.style.left  = "190px";
      rodLeft.style.width = (xL - 190) + "px";

      rodRight.style.left  = xR + "px";
      rodRight.style.width = (scene.clientWidth - 190 - xR) + "px";

      // Force commune (modèle ressort)
      const distance  = Math.abs(xR - xL);
      const extension = Math.max(0, distance - L0);
      const F         = F0 + k * extension;   // N
      const Fclamped  = Math.max(0, Math.min(40, F));

      // On projette la force sur un défilement vertical de la bande graduée
      // 0 N -> bande en haut, 40 N -> bande en bas
      const maxShift = 200; // pixels de course utile sur la bande
      const shift    = (Fclamped / 40) * maxShift;

      tapeLeft.style.top  = -shift + "px";
      tapeRight.style.top = -shift + "px";
    }

    function onMouseDown(e, which) {
      dragging = which;
      const target   = which === "left" ? pointLeft : pointRight;
      const rectScene = scene.getBoundingClientRect();
      const rect      = target.getBoundingClientRect();
      offsetX = e.clientX - (rect.left + rect.width / 2 - rectScene.left);
      window.addEventListener("mousemove", onMouseMove);
      window.addEventListener("mouseup", onMouseUp);
    }

    function onMouseMove(e) {
      if (!dragging) return;
      const rectScene = scene.getBoundingClientRect();
      const x = e.clientX - rectScene.left - offsetX;
      const target = dragging === "left" ? pointLeft : pointRight;
      setX(target, x);
      updateGeometry();
    }

    function onMouseUp() {
      dragging = null;
      window.removeEventListener("mousemove", onMouseMove);
      window.removeEventListener("mouseup", onMouseUp);
    }

    pointLeft.addEventListener("mousedown", e => onMouseDown(e, "left"));
    pointRight.addEventListener("mousedown", e => onMouseDown(e, "right"));

    function initPositions() {
      const mid = scene.clientWidth / 2;
      setX(pointLeft,  mid - L0 / 2);
      setX(pointRight, mid + L0 / 2);
      updateGeometry();
    }

    window.addEventListener("load", initPositions);
    window.addEventListener("resize", initPositions);
  </script>
</body>
</html>
