<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>3ᵉ loi de Newton - Dynamomètres</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f5f5f5;
      user-select: none;
    }

    #scene {
      position: relative;
      width: 900px;
      height: 350px;
      background: white;
      border: 1px solid #ccc;
      overflow: hidden;
    }

    /* Dynamomètres en images */
    .dynamo {
      position: absolute;
      top: 150px;
      height: 60px;          /* réduction de l’image */
      object-fit: contain;
      pointer-events: none;
    }
    #dynamoLeft {
      left: 170px;
    }
    #dynamoRight {
      right: 170px;
    }

    /* Points rouge / bleu (accrochés aux crochets) */
    .dragPoint {
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #333;
      box-sizing: border-box;
    }
    #pointLeft {
      background: red;
      top: 180px;
      left: 260px;
      transform: translate(-50%, -50%);
    }
    #pointRight {
      background: blue;
      top: 180px;
      right: 260px;
      transform: translate(50%, -50%);
    }

    /* Fenêtres des dynamomètres */
    .window {
      position: absolute;
      top: 210px;
      width: 60px;          /* largeur ≈ largeur d'une case */
      height: 40px;
      overflow: hidden;
      border-radius: 4px;
      border: 1px solid #333;
      background: white;
    }
    #windowLeft  { left: 260px; transform: translateX(-50%); }
    #windowRight { right: 260px; transform: translateX(50%); }

    /* Bande 0–10 N horizontale (622 x 136) */
    .tape {
      position: absolute;
      top: 0;
      left: 0;
      width: 622px;
      height: 40px;   /* on ne garde que la bande centrale en hauteur */
      background: url("bande_dynamometre_0_10_h.png") no-repeat left center;
      background-size: 622px 40px;
      transition: left 0.08s linear;
    }

    #controls {
      margin-top: 8px;
    }
    #resetBtn {
      padding: 4px 10px;
      font-size: 14px;
      cursor: pointer;
    }

    #signature {
      margin-top: 4px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>
  <div id="scene">
    <!-- Dynamomètres -->
    <img id="dynamoLeft"  class="dynamo" src="dynamo_g.jpg"  alt="">
    <img id="dynamoRight" class="dynamo" src="dynamo_d.jpg"  alt="">

    <!-- Points de traction -->
    <div id="pointLeft"  class="dragPoint"></div>
    <div id="pointRight" class="dragPoint"></div>

    <!-- Fenêtres & bandes -->
    <div id="windowLeft" class="window">
      <div id="tapeLeft" class="tape"></div>
    </div>
    <div id="windowRight" class="window">
      <div id="tapeRight" class="tape"></div>
    </div>
  </div>

  <div id="controls">
    <button id="resetBtn">Réinitialiser</button>
  </div>

  <div id="signature">
    Animation adaptée et codée par Virginie Fourcassier – Lycée Pierre de Fermat – Toulouse.
  </div>

  <script>
    // Paramètres "physiques"
    const F0 = 0;      // commence à 0 N
    const k  = 0.04;   // raideur fictive (ajuste si besoin)
    const L0 = 260;    // longueur au repos entre points rouge/bleu (px)

    const scene      = document.getElementById("scene");
    const pointLeft  = document.getElementById("pointLeft");
    const pointRight = document.getElementById("pointRight");
    const tapeLeft   = document.getElementById("tapeLeft");
    const tapeRight  = document.getElementById("tapeRight");
    const resetBtn   = document.getElementById("resetBtn");

    let dragging = null;

    function getX(elem) {
      const rectScene = scene.getBoundingClientRect();
      const rect      = elem.getBoundingClientRect();
      return rect.left + rect.width / 2 - rectScene.left;
    }

    function setX(elem, x) {
      const min = 180;
      const max = scene.clientWidth - 180;
      const clamped = Math.max(min, Math.min(max, x));
      elem.style.left = clamped + "px";
    }

    // Quantification sur 0,1,2,...,10 N
    function quantizeForce(F) {
      const values = [];
      for (let i = 0; i <= 10; i++) values.push(i);
      let best = values[0];
      let bestDiff = Math.abs(F - best);
      for (let i = 1; i < values.length; i++) {
        const diff = Math.abs(F - values[i]);
        if (diff < bestDiff) {
          bestDiff = diff;
          best = values[i];
        }
      }
      return best;
    }

    function updateGeometry() {
      const xL = getX(pointLeft);
      const xR = getX(pointRight);

      const distance  = Math.abs(xR - xL);
      const extension = Math.max(0, distance - L0);
      const F         = F0 + k * extension;      // N

      const Fclamped  = Math.max(0, Math.min(10, F));
      const Fdiscrete = quantizeForce(Fclamped); // 0..10

      // Bande 0–10 N : 622 px, 11 cases => largeur_case ≈ 622 / 11
      const tapeWidth    = 622;
      const nbValues     = 11;
      const segmentWidth = tapeWidth / nbValues; // ≈ 56.5 px
      const windowWidth  = 60;
      const baseOffset   = (segmentWidth - windowWidth) / 2;

      const index = Fdiscrete; // 0..10
      const shift = index * segmentWidth + baseOffset;

      tapeLeft.style.left  = -shift + "px";
      tapeRight.style.left = -shift + "px";
    }

    function onMouseDown(e, which) {
      dragging = which;
      window.addEventListener("mousemove", onMouseMove);
      window.addEventListener("mouseup", onMouseUp);
      e.preventDefault();
    }

    function onMouseMove(e) {
      if (!dragging) return;
      const rectScene = scene.getBoundingClientRect();
      const target = dragging === "left" ? pointLeft : pointRight;
      const newX = e.clientX - rectScene.left;
      setX(target, newX);
      updateGeometry();
    }

    function onMouseUp() {
      dragging = null;
      window.removeEventListener("mousemove", onMouseMove);
      window.removeEventListener("mouseup", onMouseUp);
    }

    pointLeft.addEventListener("mousedown", e => onMouseDown(e, "left"));
    pointRight.addEventListener("mousedown", e => onMouseDown(e, "right"));

    function initPositions() {
      const mid = scene.clientWidth / 2;
      setX(pointLeft,  mid - L0 / 2);
      setX(pointRight, mid + L0 / 2);
      updateGeometry();
    }

    resetBtn.addEventListener("click", initPositions);
    window.addEventListener("load", initPositions);
    window.addEventListener("resize", initPositions);
  </script>
</body>
</html>
